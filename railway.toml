[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn app:app -k gthread --workers 1 --threads 50 --bind 0.0.0.0:$PORT --timeout 300 --access-logfile - --error-logfile - --log-level info"
healthcheckPath = "/ping"
healthcheckTimeout = 60
healthcheckInterval = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = { COMPRESS_LEVEL = "9", CACHE_TYPE = "simple", CACHE_DEFAULT_TIMEOUT = "600" }
