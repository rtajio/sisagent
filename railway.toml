[build]
builder = "NIXPACKS"

[deploy]
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 300 --preload --access-logfile - --error-logfile -"
healthcheckPath = "/ping"
healthcheckTimeout = 100
healthcheckInterval = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = { COMPRESS_LEVEL = "9", CACHE_TYPE = "simple", CACHE_DEFAULT_TIMEOUT = "600" }
