[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python app_optimizado_ultra.py"
healthcheckPath = "/ping"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production]
variables = { COMPRESS_LEVEL = "6", CACHE_TYPE = "simple", CACHE_DEFAULT_TIMEOUT = "300" }
