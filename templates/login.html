<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — SISAGENT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-paper:   #2A2420;
            --bg-surface: #332E28;
            --border:     #504840;
            --accent:     #A0845A;
            --accent-hover: #B89870;
            --text:       #E8DCC8;
            --text-muted: #8A7E70;
            --danger-bg:  #2A1818;
            --danger:     #C07070;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-paper);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-wrap {
            width: 100%;
            max-width: 380px;
            padding: 1rem;
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 2.5rem 2rem;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .login-logo i {
            font-size: 2.5rem;
            color: var(--accent);
        }

        .login-logo h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: var(--text);
            margin: 0.5rem 0 0.2rem;
            letter-spacing: 0.04em;
        }

        .login-logo p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .input-group-text {
            background: var(--bg-paper);
            border: 1px solid var(--border);
            border-right: none;
            color: var(--text-muted);
        }

        .form-control {
            background: var(--bg-paper);
            border: 1px solid var(--border);
            border-left: none;
            color: var(--text);
            padding: 0.6rem 0.9rem;
            font-size: 0.95rem;
        }

        .form-control:focus {
            background: var(--bg-paper);
            border-color: var(--accent);
            box-shadow: none;
            outline: none;
            color: var(--text);
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: #F2EDE4;
            border: 1px solid var(--accent);
            border-radius: 5px;
            padding: 0.65rem;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #F2EDE4; }

        .alert-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #DFB8B8;
            border-left: 4px solid var(--danger);
            border-radius: 5px;
            padding: 0.75rem 1rem;
            font-size: 0.88rem;
            margin-bottom: 1.25rem;
        }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-university"></i>
            <h1>SISAGENT</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="alert-danger">
                <i class="fas fa-exclamation-circle me-1"></i> {{ message }}
            </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label for="username" class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user fa-sm"></i></span>
                    <input type="text" class="form-control" id="username" name="username" autocomplete="username" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock fa-sm"></i></span>
                    <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Iniciar Sesión
            </button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
